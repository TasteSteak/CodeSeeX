name: Build desktop artifacts

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      CI: true
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-latest
            npm_script: dist:linux
            artifact_name: CodeSeeX-Linux-x64
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.tar.gz
              dist/*.yml
              dist/*.blockmap
          - label: macOS arm64
            runner: macos-14
            npm_script: dist:mac
            artifact_name: CodeSeeX-MacOS-arm64
            artifact_paths: |
              dist/*.dmg
              dist/*-mac.zip
              dist/*.yml
              dist/*.blockmap
          - label: Windows x64
            runner: windows-latest
            npm_script: dist:win
            artifact_name: CodeSeeX-Windows-x64
            artifact_paths: |
              dist/*.exe
              dist/*.yml
              dist/*.blockmap

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build ${{ matrix.label }} package
        run: npm run ${{ matrix.npm_script }} -- --publish never

      - name: List generated files
        shell: bash
        run: find dist -maxdepth 2 -type f -print | sort

      - name: Upload ${{ matrix.label }} artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download desktop artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Build release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## " version "([[:space:]]|$)" { in_section = 1; print; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'CodeSeeX %s\n' "$VERSION" > release-notes.md
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=()
          for file in release-assets/**/*; do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --title "CodeSeeX $VERSION" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --title "CodeSeeX $VERSION" --notes-file release-notes.md
          fi
