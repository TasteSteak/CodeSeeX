name: Build desktop artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Restore model catalog seed
        shell: bash
        env:
          CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64: ${{ secrets.CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64 }}
        run: |
          if [ -z "$CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64" ]; then
            echo "Missing CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64 secret."
            exit 1
          fi
          python - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          payload = os.environ["CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64"]
          Path(".private").mkdir(exist_ok=True)
          Path(".private/model-catalog.seed.json").write_bytes(
              gzip.decompress(base64.b64decode(payload))
          )
          PY

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Check JavaScript and language JSON
        run: |
          node --check apps/ui/public/app.js
          node -e "const fs=require('fs'); for (const f of fs.readdirSync('apps/ui/public/lang')) JSON.parse(fs.readFileSync('apps/ui/public/lang/'+f,'utf8'));"

      - name: Test proxy crates
        run: cargo test -p codeseex-core -p codeseex-store -p codeseex-proxy

      - name: Check desktop crate
        run: cargo check -p codeseex-desktop --no-default-features --features tauri/custom-protocol

  package:
    name: ${{ matrix.label }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            bundle_args: --bundles nsis
            artifact_name: CodeSeeX-Windows-x64
          - label: macOS arm64
            os: macos-14
            bundle_args: --bundles app,dmg
            artifact_name: CodeSeeX-MacOS-arm64
          - label: Linux x64
            os: ubuntu-24.04
            bundle_args: --bundles appimage
            artifact_name: CodeSeeX-Linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Restore model catalog seed
        shell: bash
        env:
          CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64: ${{ secrets.CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64 }}
        run: |
          if [ -z "$CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64" ]; then
            echo "Missing CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64 secret."
            exit 1
          fi
          python - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          payload = os.environ["CODESEEX_MODEL_CATALOG_SEED_GZIP_BASE64"]
          Path(".private").mkdir(exist_ok=True)
          Path(".private/model-catalog.seed.json").write_bytes(
              gzip.decompress(base64.b64decode(payload))
          )
          PY

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Install Windows bundler
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Verify updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret; updater artifacts cannot be signed."
          }

      - name: Build Tauri bundle
        working-directory: apps/desktop/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --ci --features tauri/custom-protocol ${{ matrix.bundle_args }}

      - name: Upload ${{ matrix.label }} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            target/release/bundle/**/*
            apps/desktop/src-tauri/target/release/bundle/**/*

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Build release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git fetch --force --tags
          TAG_TYPE="$(git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(objecttype)')"
          if [ "$TAG_TYPE" = "tag" ]; then
            git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)' > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            printf 'CodeSeeX %s\n' "$VERSION" > release-notes.md
          fi

      - name: Prepare product assets
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import glob
          import json
          import os
          import shutil
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          tag = os.environ["GITHUB_REF_NAME"]
          base_url = f"https://github.com/TasteSteak/CodeSeeX/releases/download/{tag}"
          out_dir = Path("release-upload")
          out_dir.mkdir(exist_ok=True)
          platforms = {}

          def first(pattern):
              matches = sorted(glob.glob(pattern, recursive=True))
              return Path(matches[0]) if matches else None

          def copy_asset(source, name):
              destination = out_dir / name
              shutil.copy2(source, destination)
              return destination

          def signature_for(source):
              candidate = Path(str(source) + ".sig")
              return candidate if candidate.exists() else None

          def add_platform(keys, bundle, output_name):
              signature = signature_for(bundle)
              if not signature:
                  print(f"Skipping updater manifest entry for {', '.join(keys)}: missing {bundle.name}.sig")
                  return
              copy_asset(bundle, output_name)
              copy_asset(signature, output_name + ".sig")
              signature_text = signature.read_text(encoding="utf-8").strip()
              for key in keys:
                  platforms[key] = {
                      "signature": signature_text,
                      "url": f"{base_url}/{output_name}",
                  }

          windows_exe = first("release-assets/CodeSeeX-Windows-*/**/*.exe")
          if windows_exe:
              add_platform(
                  ["windows-x86_64-nsis", "windows-x86_64"],
                  windows_exe,
                  f"Windows-CodeSeeX.Setup.{version}.exe",
              )

          mac_dmg = first("release-assets/CodeSeeX-MacOS-*/**/*.dmg")
          if mac_dmg:
              copy_asset(mac_dmg, f"MacOS-CodeSeeX-{version}-arm64.dmg")
          mac_update = first("release-assets/CodeSeeX-MacOS-*/**/*.app.tar.gz")
          if mac_update:
              add_platform(
                  ["darwin-aarch64-app", "darwin-aarch64"],
                  mac_update,
                  f"MacOS-CodeSeeX-{version}-arm64.app.tar.gz",
              )

          linux_appimage = first("release-assets/CodeSeeX-Linux-*/**/*.AppImage")
          if linux_appimage:
              add_platform(
                  ["linux-x86_64-appimage", "linux-x86_64"],
                  linux_appimage,
                  f"Linux-CodeSeeX-{version}.AppImage",
              )

          if platforms:
              manifest = {
                  "version": version,
                  "notes": f"CodeSeeX {version}",
                  "pub_date": dt.datetime.now(dt.timezone.utc).isoformat().replace("+00:00", "Z"),
                  "platforms": platforms,
              }
              (out_dir / "latest.json").write_text(
                  json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
          else:
              raise SystemExit("No signed updater artifacts were found.")

          for path in sorted(out_dir.iterdir()):
              print(path)
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-upload/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No product assets found."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --title "CodeSeeX $VERSION" --notes-file release-notes.md --draft=false --prerelease=false --latest
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --title "CodeSeeX $VERSION" --notes-file release-notes.md --latest
          fi
